<!DOCTYPE html>
<html>
<head>
    <title>TrustSphere AI</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #444;
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            display: inline-block;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<h1>TrustSphere AI</h1>
<p>IoT Trust Detection System</p>

<form method="POST">

    <div>
        <label>Packets/min:</label><br>
        <input type="number" name="packets" required>
    </div>

    <div>
        <label>Failed Connections:</label><br>
        <input type="number" name="failed" required>
    </div>

    <button type="submit">Check</button>

</form>

{% if result %}
<div class="result-box">

    <p>{{ result.message }}</p>

    <hr>

    <p><b>Packets:</b> {{ result.packets }}</p>
    <p><b>Failed Connections:</b> {{ result.failed }}</p>
    <p><b>ML Penalty:</b> {{ result.ml_penalty }}</p>

</div>
{% endif %}

</body>
</html>
